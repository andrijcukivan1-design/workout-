<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ТРЕНЕР</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #111114;
  --card: #17171b;
  --card2: #1d1d22;
  --card3: #232329;
  --border: #26262e;
  --border2: #313139;
  --text: #f4f4f8;
  --muted: #83839a;
  --muted2: #4a4a58;
  --dim: #b4b4c6;
  --mon: #e63946;
  --wed: #457bd1;
  --fri: #2fbf8f;
  --sat: #e9b93e;
  --rest: #83839a;
  --drop: #e63946;
  --pause: #e9822e;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
button,input,textarea,select{font-family:inherit;color:inherit}
.screen{display:none;min-height:100vh;padding-bottom:88px}
.screen.active{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(17,17,20,.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;padding:11px 4px 9px;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px}
.nav-btn .nav-icon{font-size:19px;opacity:.5}
.nav-btn.active .nav-icon{opacity:1}
.nav-btn .nav-label{font-size:9px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;font-weight:700}
.nav-btn.active .nav-label{color:var(--text)}

/* HEADER */
.page-header{padding:46px 18px 12px;background:linear-gradient(180deg,#141417 0%,var(--bg) 100%);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.page-header h1{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px}
.page-header p{font-size:10.5px;color:var(--muted);margin-top:2px;letter-spacing:.4px}
.unit-toggle{display:flex;background:var(--card2);border-radius:9px;padding:3px;border:1px solid var(--border2);flex-shrink:0;margin-top:2px}
.unit-opt{padding:6px 11px;border-radius:6px;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer}
.unit-opt.active{background:var(--text);color:#111}

/* DAY TABS */
.day-tabs{display:flex;overflow-x:auto;background:var(--bg);border-bottom:1px solid var(--border);scrollbar-width:none;position:sticky;top:79px;z-index:49}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{flex-shrink:0;padding:9px 12px;border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent}
.day-tab .tab-day{font-size:12.5px;font-weight:700;letter-spacing:1px;color:var(--muted)}
.day-tab .tab-type{font-size:8px;color:var(--muted2);margin-top:2px;letter-spacing:1.2px;text-transform:uppercase}
.day-tab.active .tab-day{color:var(--text)}
.day-tab.active .tab-type{color:var(--muted)}

.content{padding:12px 14px}
.section-title{font-size:9px;letter-spacing:3px;color:var(--muted2);text-transform:uppercase;margin:16px 0 8px;font-weight:700}

.day-banner{border-radius:14px;padding:14px 16px;margin-bottom:10px;border-left:3px solid}
.day-banner h2{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px}
.day-banner .b-mode{font-size:10.5px;color:var(--muted);margin-top:4px;line-height:1.6}

/* COMPACT EXERCISE CARD */
.ex-card{background:var(--card);border-radius:13px;margin-bottom:7px;overflow:hidden;border:1px solid var(--border)}
.ex-card.open{border-color:var(--border2)}
.ex-header{padding:11px 13px;display:flex;align-items:center;gap:10px;cursor:pointer}
.ex-num{width:24px;height:24px;border-radius:7px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--muted);flex-shrink:0}
.ex-info{flex:1;min-width:0}
.ex-name{font-size:13px;font-weight:600;line-height:1.3}
.ex-weight{font-size:11.5px;color:var(--muted);margin-top:1px}
.ex-weight b{color:var(--dim);font-weight:700}
.ex-chevron{font-size:12px;color:var(--muted2);flex-shrink:0;transition:transform .2s}
.ex-card.open .ex-chevron{transform:rotate(180deg)}
.ex-body{display:none;padding:0 13px 13px;border-top:1px solid var(--border)}
.ex-card.open .ex-body{display:block;animation:fadeIn .2s ease}
.tag{display:inline-block;font-size:8.5px;font-weight:700;letter-spacing:.6px;padding:2px 7px;border-radius:20px;text-transform:uppercase;margin-left:5px;vertical-align:middle}

.info-block{background:var(--card2);border-radius:10px;padding:10px 12px;margin-top:9px}
.info-block-title{font-size:8.5px;letter-spacing:2px;color:var(--muted2);text-transform:uppercase;margin-bottom:6px;font-weight:700}
.info-block p{font-size:12px;color:var(--dim);line-height:1.7}

.muscle-row{display:flex;align-items:center;gap:8px;margin-top:5px}
.muscle-row:first-child{margin-top:0}
.muscle-name{font-size:10.5px;color:var(--muted);min-width:118px}
.muscle-track{flex:1;height:3px;background:var(--border);border-radius:2px}
.muscle-fill{height:3px;border-radius:2px}
.muscle-pct{font-size:9.5px;color:var(--muted2);min-width:26px;text-align:right}

/* DROP-SET / REST-PAUSE blocks */
.drop-block{background:rgba(230,57,70,.1);border:1px solid rgba(230,57,70,.3);border-radius:10px;padding:10px 12px;margin-top:9px}
.drop-block .db-title{font-size:8.5px;letter-spacing:2px;color:var(--drop);text-transform:uppercase;font-weight:700;margin-bottom:5px}
.drop-block p{font-size:12px;color:#ffb3b8;line-height:1.65}
.pause-block{background:rgba(233,130,46,.1);border:1px solid rgba(233,130,46,.3);border-radius:10px;padding:10px 12px;margin-top:9px}
.pause-block .pb-title{font-size:8.5px;letter-spacing:2px;color:var(--pause);text-transform:uppercase;font-weight:700;margin-bottom:5px}
.pause-block p{font-size:12px;color:#ffcfa3;line-height:1.65}

/* VARIANT SWITCHER */
.variant-switcher{margin-top:9px}
.variant-label{font-size:8.5px;letter-spacing:2px;color:var(--muted2);text-transform:uppercase;margin-bottom:7px;font-weight:700}
.variant-pills{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.variant-pills::-webkit-scrollbar{display:none}
.variant-pill{flex-shrink:0;padding:6px 11px;border-radius:9px;background:var(--card2);border:1px solid var(--border2);font-size:10.5px;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap}
.variant-pill.active{color:#111;border-color:transparent}
.variant-detail{background:var(--card3);border-radius:10px;padding:11px 12px;margin-top:8px;border:1px solid var(--border2)}
.variant-weight{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px}
.variant-note{font-size:11px;color:var(--dim);line-height:1.65;margin-top:5px}

/* TIMER BUTTON */
.timer-btn{width:100%;margin-top:9px;background:var(--card2);border:1px solid var(--border2);border-radius:10px;padding:11px;font-size:12px;font-weight:700;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px}
.timer-btn .ti{font-size:14px}

/* NOTES */
.notes-wrap{margin-top:9px}
.notes-input{width:100%;background:var(--card2);border:1px solid var(--border2);border-radius:10px;padding:10px 11px;font-size:12px;color:var(--text);resize:none;min-height:44px}
.notes-input::placeholder{color:var(--muted2)}
.notes-saved{font-size:9.5px;color:var(--muted2);margin-top:4px;height:12px}

/* SUPERSET BRACKET */
.combo-wrap{border:1.5px solid;border-radius:15px;padding:12px 10px 10px;margin-bottom:9px;position:relative}
.combo-label{display:inline-flex;align-items:center;gap:5px;font-size:9.5px;font-weight:800;letter-spacing:1.5px;padding:4px 11px;border-radius:20px;margin-bottom:8px}
.combo-meta{font-size:10.5px;color:var(--muted);margin-bottom:9px;line-height:1.6}
.combo-item{background:var(--card);border-radius:12px;border:1px solid var(--border);margin-bottom:0}
.combo-arrow{text-align:center;font-size:14px;color:var(--muted2);padding:2px 0}
.combo-final{margin-top:9px}

/* REST HERO / TIPS (rest days) */
.rest-hero{background:var(--card);border-radius:15px;padding:22px 16px;text-align:center;margin-bottom:10px;border:1px solid var(--border)}
.rest-hero .r-icon{font-size:36px;margin-bottom:8px}
.rest-hero h3{font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:2px;color:var(--dim)}
.rest-hero p{font-size:11.5px;color:var(--muted2);margin-top:5px;line-height:1.6}
.tip-card{background:var(--card);border-radius:12px;padding:13px 14px;margin-bottom:7px;border-left:3px solid}
.tip-card h4{font-size:11.5px;font-weight:700;margin-bottom:4px}
.tip-card p{font-size:11.5px;color:var(--muted);line-height:1.6}
.nutrition-box{background:var(--card2);border-radius:12px;padding:13px 14px;margin-top:9px;border:1px solid var(--border)}
.nutrition-box .nut-title{font-size:8.5px;letter-spacing:2px;color:var(--muted2);text-transform:uppercase;margin-bottom:7px;font-weight:700}
.nut-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.nut-item{background:var(--card);border-radius:8px;padding:8px 9px;border:1px solid var(--border)}
.nut-val{font-size:14px;font-weight:700;font-family:'Bebas Neue',sans-serif;letter-spacing:1px}
.nut-label{font-size:8.5px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:1px}

.home-abs-card{background:linear-gradient(135deg,var(--card2) 0%,var(--card) 100%);border-radius:13px;padding:13px 14px;margin-top:9px;border:1px solid var(--border2);cursor:pointer}
.home-abs-head{display:flex;align-items:center;gap:9px}
.home-abs-head .icon{font-size:19px}
.home-abs-head .title{font-size:12px;font-weight:700}
.home-abs-head .sub{font-size:9.5px;color:var(--muted);margin-top:1px}
.home-abs-head .chev{margin-left:auto;color:var(--muted2);transition:transform .2s;font-size:11px}
.home-abs-card.open .chev{transform:rotate(180deg)}
.home-abs-body{display:none;margin-top:11px;padding-top:11px;border-top:1px solid var(--border)}
.home-abs-card.open .home-abs-body{display:block;animation:fadeIn .2s ease}
.abs-ex-row{background:var(--card3);border-radius:10px;padding:9px 11px;margin-bottom:6px}
.abs-ex-row .aname{font-size:11.5px;font-weight:600}
.abs-ex-row .ameta{font-size:10px;color:var(--muted);margin-top:2px}
.abs-ex-row .ahow{font-size:10.5px;color:var(--dim);margin-top:4px;line-height:1.55}

/* RULES SCREEN */
.rule-card{background:var(--card);border-radius:13px;padding:14px 15px;margin-bottom:8px;border:1px solid var(--border)}
.rule-card h4{font-size:12.5px;font-weight:700;margin-bottom:6px}
.rule-card p,.rule-card li{font-size:11.5px;color:var(--dim);line-height:1.7}
.rule-card ul{padding-left:14px}
.scale-row{display:flex;align-items:center;gap:9px;background:var(--card2);border-radius:10px;padding:9px 11px;margin-bottom:6px;border-left:3px solid}
.scale-row .sn{font-family:'Bebas Neue',sans-serif;font-size:19px;width:26px;text-align:center;flex-shrink:0}
.scale-row .sd b{display:block;font-size:11.5px;color:var(--text);margin-bottom:1px}
.scale-row .sd span{font-size:11px;color:var(--muted);line-height:1.55}

/* FULLSCREEN TIMER */
.timer-fs{position:fixed;inset:0;background:rgba(10,10,12,.98);backdrop-filter:blur(10px);z-index:500;display:none;flex-direction:column;align-items:center;justify-content:center;gap:22px}
.timer-fs.show{display:flex;animation:fadeIn .2s ease}
.timer-fs-label{font-size:11px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;text-align:center;padding:0 30px}
.timer-fs-ring{width:min(72vw,280px);height:min(72vw,280px);position:relative}
.timer-fs-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.timer-fs-val{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:min(15vw,64px);letter-spacing:2px}
.timer-fs-actions{display:flex;gap:12px}
.timer-fs-btn{padding:13px 26px;border-radius:12px;border:1px solid var(--border2);background:var(--card2);color:var(--text);font-size:13px;font-weight:700;cursor:pointer}
.timer-fs-btn.primary{background:var(--text);color:#111;border-color:transparent}

.toast{position:fixed;left:50%;top:16px;transform:translateX(-50%);background:var(--card2);border:1px solid var(--border2);border-radius:10px;padding:9px 15px;font-size:12px;color:var(--text);z-index:600;display:none;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.toast.show{display:block;animation:fadeIn .2s ease}
</style>
</head>
<body>

<!-- WORKOUT SCREEN -->
<div class="screen active" id="screen-workout">
  <div class="page-header">
    <div>
      <h1>ТРЕНЕР</h1>
      <p>82 кг · 183 см · Стаж 3–5 лет · Спина → Грудь → Плечи</p>
    </div>
    <div class="unit-toggle">
      <div class="unit-opt active" id="unit-kg" onclick="setUnits('kg')">КГ</div>
      <div class="unit-opt" id="unit-lb" onclick="setUnits('lb')">LB</div>
    </div>
  </div>
  <div class="day-tabs" id="dayTabs"></div>
  <div class="content" id="dayContent"></div>
</div>

<!-- RULES SCREEN -->
<div class="screen" id="screen-rules">
  <div class="page-header">
    <div><h1>ПРАВИЛА</h1><p>RIR, приёмы интенсивности, прогрессия</p></div>
  </div>
  <div class="content" id="rulesContent"></div>
</div>

<!-- NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" onclick="showScreen('workout')" id="nav-workout">
    <span class="nav-icon">💪</span><span class="nav-label">План</span>
  </button>
  <button class="nav-btn" onclick="showScreen('rules')" id="nav-rules">
    <span class="nav-icon">📋</span><span class="nav-label">Правила</span>
  </button>
</div>

<!-- FULLSCREEN REST TIMER -->
<div class="timer-fs" id="timerFs">
  <div class="timer-fs-label" id="timerFsLabel">ОТДЫХ</div>
  <div class="timer-fs-ring">
    <svg viewBox="0 0 200 200">
      <circle cx="100" cy="100" r="88" fill="none" stroke="#26262e" stroke-width="10"/>
      <circle id="timerFsCircle" cx="100" cy="100" r="88" fill="none" stroke="#2fbf8f" stroke-width="10" stroke-linecap="round" stroke-dasharray="552.9" stroke-dashoffset="0"/>
    </svg>
    <div class="timer-fs-val" id="timerFsVal">1:30</div>
  </div>
  <div class="timer-fs-actions">
    <button class="timer-fs-btn" onclick="addTimerTime(15)">+15 сек</button>
    <button class="timer-fs-btn primary" onclick="closeTimerFs()">Готово</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* =========================================================================
   ТРЕНЕР v3 — программа строго по ТЗ пользователя
   ========================================================================= */

const STATE = { units: 'kg' };
const KG_TO_LB = 2.20462;

function weightLabel(weight, unitStr) {
  if (weight == null) return unitStr || '';
  const suffix = (unitStr || '').replace(/^кг/, '');
  const unitLabel = STATE.units === 'lb' ? 'lb' : 'кг';
  const val = STATE.units === 'lb' ? Math.round(weight * KG_TO_LB) : weight;
  return `${val} ${unitLabel}${suffix}`;
}
function weightRangeLabel(lo, hi, unitStr) {
  const suffix = (unitStr || '').replace(/^кг/, '');
  const unitLabel = STATE.units === 'lb' ? 'lb' : 'кг';
  const loV = STATE.units === 'lb' ? Math.round(lo * KG_TO_LB) : lo;
  const hiV = STATE.units === 'lb' ? Math.round(hi * KG_TO_LB) : hi;
  return `${loV}–${hiV} ${unitLabel}${suffix}`;
}

/* ---------------------------------------------------------------------- */
/* HOME ABS (гибкий блок, дни отдыха)                                      */
/* ---------------------------------------------------------------------- */

const HOME_ABS = {
  title: '🏠 Пресс дома',
  sub: 'Резинка + турник · 3 упражнения',
  exercises: [
    { name: 'Скручивания с резинкой', sets: '4 × 10', muscles: 'Верх пресса',
      how: 'Резинка упирается в квадрицепсы, скручивание вверх против сопротивления, пауза 1 сек.' },
    { name: 'Боковые скручивания с резинкой', sets: '4 × 10 на сторону', muscles: 'Косые',
      how: 'Скручивание в сторону против сопротивления резинки, медленный контроль.' },
    { name: 'Подъём ног в висе', sets: '4 × 10', muscles: 'Нижний пресс',
      how: 'Вис на турнике, подъём ног с подкрутом таза вверху, без раскачки.' }
  ]
};

/* ---------------------------------------------------------------------- */
/* PROGRAM                                                                 */
/* ---------------------------------------------------------------------- */

const DAYS = {

  mon: {
    color: '#e63946', title: 'ПОНЕДЕЛЬНИК — СИЛА', tabType: 'Сила',
    mode: 'Чередование спина/грудь/спина/грудь · отдых 2–3 мин',
    exercises: [
      {
        name: 'Подтягивания с весом', weight: 20, unit: 'кг', sets: '5', reps: '6', rest: 165, tag: '★ ГЛАВНОЕ',
        muscles: [['Широчайшие', 55], ['Верх спины', 30], ['Трапеция', 15]],
        how: 'Подх. 1–2: локти вперёд-вниз — акцент широчайшие. Подх. 3–4: локти в стороны — акцент верх спины. Подх. 5: короткий хват до отказа — акцент трапеция.',
        tempo: 'Вверх взрывно → пауза 1 сек → вниз 3 сек (негатив)',
        progression: 'Все 5×6 выполнены чисто → +2.5 кг на следующей тренировке.',
        altVariants: [{ name: 'Тяга верхнего блока', weight: 62, unit: 'кг', note: 'Широкий хват к груди — если турник или пояс заняты.' }]
      },
      {
        name: 'Хаммер', weight: 60, unit: 'кг/сторону', sets: '4', reps: '6', rest: 120, tag: null,
        muscles: [['Грудь', 70], ['Передняя дельта', 20], ['Трицепс', 10]],
        how: 'Спина прижата к спинке весь подход. Жмёшь до почти полного разгибания, пауза 0.5 сек.',
        tempo: 'Вперёд контролируемо → пауза 0.5 сек → назад 2–3 сек',
        progression: '4×6 легко на всех подходах → +5 кг.',
        altVariants: [{ name: 'Гантели лёжа', weight: 34, unit: 'кг/рука', note: 'Свободный вес, без угла — стабилизацию держат плечи, поэтому вес ниже суммарного в тренажёре.' }]
      },
      {
        name: 'Тяга в Смите', weight: 82, unit: 'кг (+ пояс)', sets: '4', reps: '6', rest: 150, tag: null,
        muscles: [['Середина спины', 50], ['Широчайшие', 30], ['Задняя дельта', 20]],
        how: 'Наклон 30–45°, спина нейтральна. Тянешь гриф к пупку, пауза 1 сек со сведением лопаток.',
        tempo: 'Вверх контролируемо → пауза 1 сек → вниз 2–3 сек',
        progression: 'Чистые 4×6 → +5 кг.',
        altVariants: [{ name: 'Свободная штанга', weight: 82, unit: 'кг', note: 'Тот же вес и наклон — больше стабилизации корпусом, чем в Смите.' }]
      },
      {
        name: 'Брусья с весом', weight: 20, unit: 'кг', sets: '3', reps: '8', rest: 120, tag: '★ ЛЮБИМОЕ',
        muscles: [['Грудь', 55], ['Трицепс', 35], ['Передняя дельта', 10]],
        how: 'Наклон корпуса вперёд ~30° — переносит нагрузку с трицепса на грудь. Вниз до параллели предплечий с полом.',
        tempo: 'Вниз 2–3 сек → вверх взрывно',
        progression: '3×8 чисто → +2.5 кг.'
      },
      {
        name: 'Жим гантелей сидя', weight: 25, unit: 'кг/рука', weightLo: 22, weightHi: 28, sets: '2', reps: '8–10', rest: 90, tag: null,

    <div class="scale-row" style="border-color:#e9b93e"><div class="sn">1</div><div class="sd"><b>RIR 1 — тяжело</b><span>Последний повтор с заметным замедлением. Уместен на изоляции и финальных подходах.</span></div></div>
    <div class="scale-row" style="border-color:#e63946"><div class="sn">0</div><div class="sd"><b>RIR 0 — отказ</b><span>Следующий повтор невозможен технично. Только изоляция, только последний подход — никогда на тяжёлой базе.</span></div></div>

    <div class="rule-card">

      <p>Два упражнения выполняются подряд без отдыха между ними, отдых — только после завершения пары. В программе суперсеты только на изоляции/мелких группах (руки, дельты) или на противоположных по функции мышцах (грудь толкает / спина тянет в среду) — там усталость от первого движения не портит технику второго.</p>

    <div class="rule-card">
      <h4 style="color:#ff8891">📉 Что это</h4>
      <p>Последний подход упражнения: довёл до целевых повторов, сразу без паузы снизил вес (обычно на 20–30%) и продолжил до отказа. Работает только там, где смена веса занимает секунды — на блоках и тренажёрах, не на свободной штанге.</p>
    </div>

    <div class="section-title">Rest-pause</div>
    <div class="rule-card">

      <p>Довёл подход почти до отказа, отдохнул 15–20 сек не выпуская снаряд из зоны, затем добил ещё несколько повторов тем же весом, при необходимости повторил ещё раз. Позволяет набрать больше эффективных повторов на тяжёлом весе, чем один сплошной подход — используется точечно, на финальном подходе тяжёлого движения.</p>

        <li>Тяжёлая база (понедельник): 2–2.5 мин, не меньше</li>
        <li>Объёмная работа (среда): 60–90 сек</li>
        <li>Суперсеты: 60–90 сек только после пары, между А и Б — без отдыха</li>
        <li>После бокса (суббота): 45–60 сек — ты уже разогрет</li>
      </ul>
    </div>

    <div class="section-title">Сон</div>
    <div class="rule-card">
      <h4>😴 Сон = рост</h4>
      <p>Большая часть восстановления и роста мышц происходит во сне. Пик гормона роста — в первые 1–2 часа глубокого сна. 7–9 часов — физиологическое условие, а не рекомендация для галочки.</p>
    </div>
  `;
}
/* ---------------------------------------------------------------------- */
/* STORAGE HELPERS (persistent storage substitutes localStorage)           */
/* ---------------------------------------------------------------------- */

STATE.keyIndex = [];

async function markKey(k) {
  if (STATE.keyIndex.indexOf(k) === -1) {
    STATE.keyIndex.push(k);
    try { await window.storage.set('meta:allkeys', JSON.stringify(STATE.keyIndex), false); } catch (e) {}
  }
}
async function loadKeyIndex() {
  try { const r = await window.storage.get('meta:allkeys', false); STATE.keyIndex = r ? JSON.parse(r.value) : []; }
  catch (e) { STATE.keyIndex = []; }
}
async function storSet(key, value) {
  try { await window.storage.set(key, JSON.stringify(value), false); await markKey(key); return true; }
  catch (e) { console.error('storage set failed', e); return false; }
}
async function storGet(key) {
  try { const r = await window.storage.get(key, false); return r ? JSON.parse(r.value) : null; }
  catch (e) { return null; }
}

/* ---------------------------------------------------------------------- */
/* SETTINGS (units)                                                         */
/* ---------------------------------------------------------------------- */

async function loadSettings() {
  const s = await storGet('settings');
  if (s && s.units) STATE.units = s.units;
}
async function saveSettings() { await storSet('settings', { units: STATE.units }); }

function setUnits(u) {
  STATE.units = u;
  document.getElementById('unit-kg').classList.toggle('active', u === 'kg');
  document.getElementById('unit-lb').classList.toggle('active', u === 'lb');
  saveSettings();
  if (document.getElementById('screen-workout').classList.contains('active')) renderDay(currentDay);
}

/* ---------------------------------------------------------------------- */
/* NOTES (per exercise, persisted)                                         */
/* ---------------------------------------------------------------------- */

let noteSaveTimer = null;
function onNoteInput(dayKey, key, value) {
  const el = document.getElementById(`saved-${dayKey}-${key}`);
  if (el) el.textContent = '';
  clearTimeout(noteSaveTimer);
  noteSaveTimer = setTimeout(async () => {
    await storSet(`note:${dayKey}:${key}`, value);
    if (el) { el.textContent = 'Сохранено ✓'; setTimeout(() => { if (el) el.textContent = ''; }, 1500); }
  }, 500);
}

async function hydrateNotes(dayKey) {
  for (const k of STATE.keyIndex) {
    const prefix = `note:${dayKey}:`;
    if (k.indexOf(prefix) === 0) {
      const key = k.slice(prefix.length);
      const val = await storGet(k);
      const ta = document.getElementById(`notes-${dayKey}-${key}`);
      if (ta && val) ta.value = val;
    }
  }
}

/* ---------------------------------------------------------------------- */
/* VARIANT SWITCHER                                                        */
/* ---------------------------------------------------------------------- */

function selectVariant(dayKey, key, vi, color) {
  const variants = getExByKey(dayKey, key).altVariants;
  variants.forEach((opt, i) => {
    const pill = document.getElementById(`vpill-${dayKey}-${key}-${i}`);
    const detail = document.getElementById(`vdetail-${dayKey}-${key}-${i}`);
    if (i === vi) { pill.classList.add('active'); pill.style.background = color; detail.style.display = 'block'; }
    else { pill.classList.remove('active'); pill.style.background = ''; detail.style.display = 'none'; }
  });
}

/* ---------------------------------------------------------------------- */
/* FULLSCREEN REST TIMER                                                   */
/* ---------------------------------------------------------------------- */

let timerInterval = null;
let timerRemaining = 0;
let timerTotal = 0;
const TIMER_FS_CIRC = 552.9; // 2*PI*88

function startTimer(totalSec, label) {
  clearInterval(timerInterval);
  const overlay = document.getElementById('timerFs');
  const labelEl = document.getElementById('timerFsLabel');
  const valEl = document.getElementById('timerFsVal');
  const circle = document.getElementById('timerFsCircle');
  labelEl.textContent = 'ОТДЫХ · ' + label.toUpperCase();
  overlay.classList.add('show');
  timerTotal = totalSec;
  timerRemaining = totalSec;

  function render() {
    const r = Math.max(0, timerRemaining);
    const m = Math.floor(r / 60), s = r % 60;
    valEl.textContent = m + ':' + String(s).padStart(2, '0');
    const frac = Math.max(0, r / timerTotal);
    circle.setAttribute('stroke-dashoffset', String(TIMER_FS_CIRC * (1 - frac)));
  }
  render();
  timerInterval = setInterval(() => {
    timerRemaining--;
    if (timerRemaining <= 0) {
      clearInterval(timerInterval);
      valEl.textContent = '0:00';
      labelEl.textContent = 'ПОРА РАБОТАТЬ';
      if (navigator.vibrate) { try { navigator.vibrate([200, 100, 200]); } catch (e) {} }
      return;
    }
    render();
  }, 1000);
}
function addTimerTime(sec) {
  timerRemaining += sec;
  timerTotal += sec;
  const valEl = document.getElementById('timerFsVal');
  const circle = document.getElementById('timerFsCircle');
  const m = Math.floor(timerRemaining / 60), s = timerRemaining % 60;
  valEl.textContent = m + ':' + String(s).padStart(2, '0');
  circle.setAttribute('stroke-dashoffset', String(TIMER_FS_CIRC * (1 - timerRemaining / timerTotal)));
}
function closeTimerFs() { clearInterval(timerInterval); document.getElementById('timerFs').classList.remove('show'); }

/* ---------------------------------------------------------------------- */
/* TOAST                                                                    */
/* ---------------------------------------------------------------------- */

let toastTimer = null;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}
/* ---------------------------------------------------------------------- */
/* HELPERS                                                                  */
/* ---------------------------------------------------------------------- */

function getExByKey(dayKey, key) {
  const d = DAYS[dayKey];
  if (key.indexOf('.') >= 0) {
    const [ci, ii] = key.split('.').map(Number);
    return d.exercises[ci].items[ii];
  }
  return d.exercises[Number(key)];
}

function parseSetCount(setsStr) { const n = parseInt(setsStr, 10); return isNaN(n) ? 3 : n; }

function weightMeta(ex) {
  if (ex.weightLo != null && ex.weightHi != null) return weightRangeLabel(ex.weightLo, ex.weightHi, ex.unit);
  return weightLabel(ex.weight, ex.unit);
}

/* ---------------------------------------------------------------------- */
/* DAY TABS                                                                 */
/* ---------------------------------------------------------------------- */

function renderDayTabs() {
  const el = document.getElementById('dayTabs');
  el.innerHTML = DAY_ORDER.map(key => {
    const d = DAYS[key];
    const color = d.rest ? '' : `style="color:${d.color}"`;
    return `<button class="day-tab" onclick="showDay('${key}')" id="tab-${key}">
      <div class="tab-day" ${color}>${DAY_LABEL[key]}</div>
      <div class="tab-type">${d.rest ? 'Отдых' : d.tabType}</div>
    </button>`;
  }).join('');
}

/* ---------------------------------------------------------------------- */
/* HOME ABS                                                                 */
/* ---------------------------------------------------------------------- */

function renderHomeAbs() {
  const rows = HOME_ABS.exercises.map((ex, i) => `
    <div class="abs-ex-row">
      <div class="aname">${i + 1}. ${ex.name}</div>
      <div class="ameta">${ex.sets} · ${ex.muscles}</div>
      <div class="ahow">${ex.how}</div>
    </div>`).join('');
  return `
    <div class="home-abs-card" id="homeAbsCard" onclick="toggleHomeAbs()">
      <div class="home-abs-head">
        <div class="icon">🏠</div>
        <div><div class="title">${HOME_ABS.title}</div><div class="sub">${HOME_ABS.sub}</div></div>
        <div class="chev">▾</div>
      </div>
      <div class="home-abs-body">${rows}</div>
    </div>`;
}
function toggleHomeAbs() { document.getElementById('homeAbsCard').classList.toggle('open'); }

/* ---------------------------------------------------------------------- */
/* EXERCISE CARD PARTS                                                      */
/* ---------------------------------------------------------------------- */

function renderMuscleBars(muscles, color) {
  return muscles.map(([name, pct]) => `
    <div class="muscle-row">
      <div class="muscle-name">${name}</div>
      <div class="muscle-track"><div class="muscle-fill" style="width:${pct}%;background:${color}"></div></div>
      <div class="muscle-pct">${pct}%</div>
    </div>`).join('');
}

function renderVariants(dayKey, key, altVariants, color) {
  if (!altVariants || !altVariants.length) return '';
  const pills = altVariants.map((opt, vi) => `
    <button class="variant-pill ${vi === 0 ? 'active' : ''}" id="vpill-${dayKey}-${key}-${vi}"
      style="${vi === 0 ? `background:${color};` : ''}"
      onclick="selectVariant('${dayKey}','${key}',${vi},'${color}')">${opt.name}</button>`).join('');
  const details = altVariants.map((opt, vi) => `
    <div class="variant-detail" id="vdetail-${dayKey}-${key}-${vi}" style="${vi === 0 ? '' : 'display:none'}">
      <span class="variant-weight" style="color:${color}">${weightLabel(opt.weight, opt.unit)}</span>
      <p class="variant-note">${opt.note}</p>
    </div>`).join('');
  return `<div class="variant-switcher">
    <div class="variant-label">🔁 Замена</div>
    <div class="variant-pills">${pills}</div>
    ${details}
  </div>`;
}

function renderDropset(d) {
  if (!d) return '';
  return `<div class="drop-block"><div class="db-title">📉 Дроп-сет</div><p>${d.note}</p></div>`;
}
function renderRestpause(r) {
  if (!r) return '';
  return `<div class="pause-block"><div class="pb-title">⏸ Rest-pause</div><p>${r.note}</p></div>`;
}

function renderNotesBlock(dayKey, key) {
  return `
    <div class="notes-wrap">
      <div class="variant-label">📝 Заметки</div>
      <textarea class="notes-input" id="notes-${dayKey}-${key}" placeholder="Настройки сиденья, ощущения, заметки..." oninput="onNoteInput('${dayKey}','${key}',this.value)"></textarea>
      <div class="notes-saved" id="saved-${dayKey}-${key}"></div>
    </div>`;
}

function renderTimerBtn(dayKey, key, ex, rest, color) {
  const m = Math.floor(rest / 60), s = rest % 60;
  const label = m + ':' + String(s).padStart(2, '0');
  return `<button class="timer-btn" onclick="startTimer(${rest}, '${ex.name.replace(/'/g, "\\'")}')"><span class="ti">⏱</span> Таймер отдыха · ${label}</button>`;
}

/* Full inner body of one exercise (used both standalone and inside a combo item) */
function renderExerciseInner(dayKey, key, ex, color, rest) {
  return `
    <div class="info-block"><div class="info-block-title">Мышцы</div>${renderMuscleBars(ex.muscles, color)}</div>
    <div class="info-block" style="background:${color}0d;border:1px solid ${color}22">
      <div class="info-block-title" style="color:${color}99">Как делать</div><p>${ex.how}</p>
    </div>
    <div class="info-block"><div class="info-block-title">Темп</div><p style="color:${color}">${ex.tempo}</p></div>
    <div class="info-block"><div class="info-block-title">Прогрессия</div><p>${ex.progression}</p></div>
    ${renderDropset(ex.dropset)}
    ${renderRestpause(ex.restpause)}
    ${renderVariants(dayKey, key, ex.altVariants, color)}
    ${renderTimerBtn(dayKey, key, ex, rest, color)}
    ${renderNotesBlock(dayKey, key)}`;
}

/* ---------------------------------------------------------------------- */
/* DAY RENDER                                                               */
/* ---------------------------------------------------------------------- */

function renderDay(dayKey) {
  const d = DAYS[dayKey];
  const el = document.getElementById('dayContent');

  if (d.rest) {
    const tipsHtml = d.tips.map(t => `
      <div class="tip-card" style="border-color:${t.color}">
        <h4 style="color:${t.color === '#3a3a44' ? 'var(--muted)' : t.color}">${t.title}</h4>
        <p>${t.text}</p>
      </div>`).join('');
    const checkHtml = d.checklist.map(c => `<li style="font-size:11.5px;color:var(--muted);line-height:1.8;padding-left:16px;position:relative;list-style:none"><span style="position:absolute;left:0;color:var(--fri)">✓</span>${c}</li>`).join('');
    const nutHtml = d.nutrition ? `
      <div class="nutrition-box">
        <div class="nut-title">Питание сегодня</div>
        <div class="nut-grid">
          <div class="nut-item"><div class="nut-val">${d.nutrition.kcal}</div><div class="nut-label">ккал</div></div>
          <div class="nut-item"><div class="nut-val">${d.nutrition.protein}</div><div class="nut-label">белок</div></div>
          <div class="nut-item"><div class="nut-val">${d.nutrition.carbs}</div><div class="nut-label">углеводы</div></div>
          <div class="nut-item"><div class="nut-val">${d.nutrition.fat}</div><div class="nut-label">жиры</div></div>
        </div>
      </div>` : '';
    el.innerHTML = `
      <div class="rest-hero">
        <div class="r-icon">🛌</div><h3>${d.title}</h3><p>${d.subtitle}</p>
      </div>
      <div class="section-title">Сегодня</div>
      <div class="tip-card" style="border-color:var(--rest)"><ul style="padding-left:0;margin:0">${checkHtml}</ul>${nutHtml}${d.homeAbs ? renderHomeAbs() : ''}</div>
      ${tipsHtml}`;
    return;
  }

  const cardsHtml = d.exercises.map((card, i) => {
    if (card.combo) {
      const itemsHtml = card.items.map((it, j, arr) => {
        const key = `${i}.${j}`;
        return `
          <div class="ex-card combo-item" id="ex-${dayKey}-${i}-${j}">
            <div class="ex-header" onclick="toggleExN('${dayKey}',${i},${j})">
              <div class="ex-num" id="num-${dayKey}-${i}-${j}">${j === 0 ? 'А' : 'Б'}</div>
              <div class="ex-info">
                <div class="ex-name">${it.name.replace(/^[АБ]\.\s*/, '')}</div>
                <div class="ex-weight"><b>${it.sets || card.rounds}×${it.reps}</b> · ${weightMeta(it)}</div>
              </div>
              <div class="ex-chevron">▾</div>
            </div>
            <div class="ex-body">${renderExerciseInner(dayKey, key, it, d.color, card.restBetweenRounds)}</div>
          </div>${j < arr.length - 1 ? '<div class="combo-arrow">⬇ без отдыха</div>' : ''}`;
      }).join('');
      return `
        <div class="combo-wrap" style="border-color:${d.color}55">
          <span class="combo-label" style="background:${d.color}22;color:${d.color}">🔗 ${card.label} · ${card.rounds} раунда</span>
          <div class="combo-meta">${card.note}</div>
          ${itemsHtml}
        </div>`;
    }

    const ex = card;
    const key = `${i}`;
    const tagHtml = ex.tag ? `<span class="tag" style="background:${d.color}22;color:${d.color}">${ex.tag}</span>` : '';
    return `
      <div class="ex-card" id="ex-${dayKey}-${i}">
        <div class="ex-header" onclick="toggleEx('${dayKey}',${i})">
          <div class="ex-num" id="num-${dayKey}-${i}">${i + 1}</div>
          <div class="ex-info">
            <div class="ex-name">${ex.name} ${tagHtml}</div>
            <div class="ex-weight"><b>${ex.sets}×${ex.reps}</b> · ${weightMeta(ex)}</div>
          </div>
          <div class="ex-chevron">▾</div>
        </div>
        <div class="ex-body">${renderExerciseInner(dayKey, key, ex, d.color, ex.rest)}</div>
      </div>`;
  }).join('');

  el.innerHTML = `
    <div class="day-banner" style="background:${d.color}0d;border-color:${d.color};color:${d.color}">
      <h2 style="color:${d.color}">${d.title}</h2>
      <div class="b-mode">⚙️ ${d.mode}</div>
    </div>
    ${cardsHtml}`;

  hydrateNotes(dayKey);
}

function toggleEx(dayKey, i) { document.getElementById(`ex-${dayKey}-${i}`).classList.toggle('open'); }
function toggleExN(dayKey, i, j) { document.getElementById(`ex-${dayKey}-${i}-${j}`).classList.toggle('open'); }

let currentDay = 'mon';
function showDay(key) {
  currentDay = key;
  document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + key).classList.add('active');
  renderDay(key);
  document.getElementById('dayContent').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* ---------------------------------------------------------------------- */
/* NAV / INIT                                                               */
/* ---------------------------------------------------------------------- */

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  window.scrollTo(0, 0);
  if (name === 'rules') renderRules();
}

async function initApp() {
  await loadKeyIndex();
  await loadSettings();
  document.getElementById('unit-kg').classList.toggle('active', STATE.units === 'kg');
  document.getElementById('unit-lb').classList.toggle('active', STATE.units === 'lb');
  renderDayTabs();
  document.getElementById('tab-mon').classList.add('active');
  renderDay('mon');
}
initApp();

</script>
